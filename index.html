<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>アニメカレンダー（ベース）</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="page-header">
      <button id="open-json-editor" class="json-editor-open" type="button">JSON編集ツール</button>
      <h1>アニメ配信カレンダー</h1>
      <p>アクセス日を中央にした 1 週間表示（前後 3 日）</p>
      <p id="date-range" class="date-range"></p>
    </header>

    <section aria-label="週間カレンダー">
      <table class="calendar-table">
        <thead>
          <tr id="header-date-row"></tr>
          <tr id="header-weekday-row"></tr>
        </thead>
        <tbody>
          <tr id="program-row"></tr>
        </tbody>
      </table>
    </section>

    <section class="csv-tools" aria-label="番組データ入力">
      <h2>番組データ入力</h2>
      <p class="csv-caption">1レコードは <code>quarter,weekday,media,time,title</code> の順で編集できます（JSON編集ツールから入出力）。</p>

      <form id="program-form" class="form-row">
        <label class="field-media">
          メディア
          <select id="media-input" required>
            <option value="Netflix">Netflix</option>
            <option value="Prime Video">Prime Video</option>
            <option value="Disney+">Disney+</option>
            <option value="U-NEXT">U-NEXT</option>
            <option value="ABEMA">ABEMA</option>
            <option value="dアニメ">dアニメ</option>
            <option value="Hulu">Hulu</option>
            <option value="Lemino">Lemino</option>
          </select>
        </label>

        <label class="field-weekday">
          曜日
          <select id="weekday-input" required>
            <option value="1">月</option>
            <option value="2">火</option>
            <option value="3">水</option>
            <option value="4">木</option>
            <option value="5">金</option>
            <option value="6">土</option>
            <option value="0">日</option>
          </select>
        </label>

        <label class="field-time">
          時間
          <input id="time-input" type="time" required />
        </label>

        <label class="field-title">
          タイトル
          <input id="title-input" type="text" placeholder="作品タイトル" required />
        </label>

        <label class="field-quarter">
          四半期
          <input id="quarter-input" type="text" placeholder="2026年春" required />
        </label>

        <button type="submit" class="primary">番組データを追加</button>
      </form>
    </section>
  </main>

  <div id="json-editor-modal" class="modal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="json-editor-title">
      <div class="modal-header">
        <h2 id="json-editor-title">JSONファイル編集ツール</h2>
        <button id="close-json-editor" type="button" class="ghost">閉じる</button>
      </div>
      <p class="modal-caption">CSV時と同じ入力ルールで、<strong>quarter → weekday → media → time → title</strong> の順に編集できます。</p>
      <div id="json-editor-rows" class="json-editor-rows" aria-label="JSON編集行"></div>
      <div class="modal-actions">
        <button id="add-editor-row" type="button">行を追加</button>
        <button id="apply-json" type="button" class="primary">反映</button>
        <button id="export-json" type="button">JSONを書き出し</button>
        <button id="import-json" type="button">JSONを読み込み</button>
        <input id="json-file-input" type="file" accept="application/json,.json" hidden />
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
